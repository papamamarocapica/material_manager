<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}教材リンク管理アプリ{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div>
                <h1><a href="{{ url_for('materials.index') }}">教材リンク管理アプリ</a></h1>
                <p class="subtitle">講義資料・参考URL・メモを一元管理する Flask + SQLite アプリ</p>
            </div>
            <a class="button primary" href="{{ url_for('materials.create_material') }}">＋ 新規登録</a>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-list">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
